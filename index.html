<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Cat Comic 任務網站</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --surface: #fffdf8;
      --surface-soft: #f1eee6;
      --ink: #25211d;
      --muted: #6f6860;
      --line: #d8d0c3;
      --accent: #2f5145;
      --danger: #8b4037;
      --white: #ffffff;
      --shadow: 0 10px 30px rgba(35, 31, 27, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      letter-spacing: 0;
    }

    a { color: inherit; }

    button, input, select, textarea {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 64px;
      position: relative;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .brand-kicker {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      margin: 6px 0 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 4.8vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 640px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 16px;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      padding: 6px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .tab {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab[aria-selected="true"] {
      background: var(--ink);
      color: var(--white);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .student-layout {
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 18px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: var(--ink);
      margin-bottom: 7px;
    }

    select, input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--ink);
      border-radius: 6px;
      padding: 11px 12px;
      outline: none;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 81, 69, .14);
    }

    .student-card {
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--white);
      border: 1px solid var(--line);
    }

    .student-card h2 {
      margin: 0;
      font-size: 30px;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: 0;
    }

    .meta-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px dashed rgba(123, 102, 89, .35);
      padding-bottom: 7px;
    }

    .meta strong {
      color: var(--ink);
      text-align: right;
    }

    .events {
      margin-top: 14px;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .events h3, .teacher-section h3 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .events ol {
      margin: 0;
      padding-left: 22px;
      line-height: 1.8;
    }

    .main {
      padding: 18px;
    }

    .step {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .step:last-child { border-bottom: 0; }

    .badge {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--ink);
      color: var(--white);
      font-size: 20px;
      font-weight: 800;
    }

    .step h2 {
      margin: 2px 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .step p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .need {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 6px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .mini-steps {
      margin: 8px 0 12px;
      padding-left: 24px;
      color: var(--muted);
      line-height: 1.75;
    }

    .mini-steps li::marker {
      color: var(--ink);
      font-weight: 900;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin: 12px 0 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: var(--white);
      min-height: 42px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
    }

    .step .action-row {
      flex-direction: column;
      align-items: flex-start;
      flex-wrap: nowrap;
      gap: 10px;
      margin: 14px 0 12px;
    }

    .step .btn {
      width: min(100%, 320px);
      min-height: 50px;
      justify-content: flex-start;
      padding: 12px 16px;
      font-size: 16px;
    }

    .role-image-wrap .action-row {
      margin-top: 12px;
    }

    .btn.secondary {
      background: var(--white);
      color: var(--ink);
      border-color: var(--line);
    }

    .btn.green {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn.red {
      background: var(--danger);
      border-color: var(--danger);
    }

    .btn:disabled {
      opacity: .46;
      cursor: not-allowed;
    }

    .role-image-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 14px;
      align-items: center;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
    }

    .role-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      cursor: grab;
      user-select: none;
    }

    .empty-image {
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px dashed var(--muted);
      border-radius: 6px;
      line-height: 1.6;
    }

    .prompt-default,
    .prompt-editor {
      margin-top: 10px;
      padding: 12px;
      background: #fbfaf7;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .prompt-default-head,
    .prompt-editor-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .prompt-default-head label,
    .prompt-editor-head label {
      margin: 0;
    }

    .prompt-default-head span,
    .prompt-editor-head span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .prompt-box {
      padding: 12px;
      background: var(--white);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 6px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .prompt-editor {
      padding: 0;
    }

    .prompt-editor summary {
      cursor: pointer;
      padding: 12px;
      color: var(--ink);
      font-weight: 900;
    }

    .prompt-editor-body {
      padding: 0 12px 12px;
    }

    .prompt-editor textarea {
      min-height: 180px;
      line-height: 1.65;
      font-size: 14px;
      resize: vertical;
    }

    .prompt-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 0;
    }

    .prompt-actions .btn {
      width: auto;
      min-width: 104px;
    }

    .notice {
      margin-top: 10px;
      border-left: 4px solid var(--accent);
      padding: 10px 12px;
      background: var(--surface-soft);
      color: var(--muted);
      line-height: 1.5;
      border-radius: 0 6px 6px 0;
    }

    .notice.strong {
      border-left-color: var(--ink);
      background: var(--surface-soft);
      color: var(--ink);
    }

    .checklist {
      display: grid;
      gap: 10px;
      margin: 10px 0 0;
    }

    .check {
      display: flex;
      gap: 9px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
      cursor: pointer;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .teacher {
      display: none;
      padding: 18px;
    }

    .teacher.active, .student.active {
      display: block;
    }

    .student {
      display: none;
    }

    .teacher-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 18px;
      align-items: start;
    }

    .teacher-section {
      padding: 16px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .full { grid-column: 1 / -1; }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.55;
    }

    .file-drop {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 180px;
      border: 1px dashed var(--muted);
      border-radius: var(--radius);
      background: var(--surface-soft);
      text-align: center;
      color: var(--muted);
      overflow: hidden;
      padding: 12px;
    }

    .file-drop img {
      max-width: 100%;
      max-height: 240px;
      border-radius: 6px;
    }

    .file-drop input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .student-list {
      display: grid;
      gap: 10px;
      max-height: 520px;
      overflow: auto;
      padding-right: 4px;
    }

    .row-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
    }

    .row-card strong {
      display: block;
      margin-bottom: 3px;
    }

    .row-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .sample {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: var(--ink);
      color: var(--white);
      padding: 12px 14px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 50;
      font-weight: 800;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .topbar, .student-layout, .teacher-grid, .role-image-wrap {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .mode-tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .step {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand-kicker">AI Warriors Mission Site</div>
        <h1>My Cat Comic</h1>
      </div>
      <nav class="mode-tabs" aria-label="模式切換">
        <button class="tab" id="studentTab" aria-selected="true">學生任務</button>
        <button class="tab" id="teacherTab" aria-selected="false">老師管理</button>
      </nav>
    </header>

    <section class="student active" id="studentView">
      <div class="student-layout">
        <aside class="panel sidebar">
          <label for="studentSelect">選擇你的名字</label>
          <select id="studentSelect"></select>

          <div class="student-card" id="studentCard"></div>
          <div class="events" id="eventsCard"></div>
        </aside>

        <main class="panel main" id="steps"></main>
      </div>
    </section>

    <section class="panel teacher" id="teacherView">
      <div class="teacher-grid">
        <div class="teacher-section">
          <h3>新增或更新學生</h3>
          <form id="studentForm">
            <input type="hidden" id="editingId">
            <div class="form-grid">
              <div>
                <label for="nameInput">姓名</label>
                <input id="nameInput" type="text" required placeholder="小安">
              </div>
              <div>
                <label for="groupInput">組別</label>
                <input id="groupInput" type="text" placeholder="A 組">
              </div>
              <div>
                <label for="roleInput">角色</label>
                <input id="roleInput" type="text" placeholder="Coach">
              </div>
              <div>
                <label for="storyInput">故事名稱</label>
                <input id="storyInput" type="text" placeholder="The Test of Courage">
              </div>
              <div class="full">
                <label>角色圖</label>
                <div class="file-drop" id="imageDrop">
                  <input id="imageInput" type="file" accept="image/*">
                  <div id="imagePreview">上傳角色圖</div>
                </div>
              </div>
              <div class="full">
                <label for="eventsInput">四個事件，每行一個</label>
                <textarea id="eventsInput" required placeholder="我在訓練中心教小騎士練習。&#10;我看到有小騎士很害怕。&#10;我告訴他們不要放棄。&#10;大家一起重新練習。"></textarea>
              </div>
            </div>
            <div class="action-row">
              <button class="btn green" type="submit">儲存學生</button>
              <button class="btn secondary" type="button" id="clearFormBtn">清空表單</button>
            </div>
          </form>
        </div>

        <div class="teacher-section">
          <h3>學生資料</h3>
          <div class="action-row">
            <button class="btn secondary" id="exportJsonBtn" type="button">匯出 JSON</button>
            <button class="btn secondary" id="importJsonBtn" type="button">匯入 JSON</button>
            <button class="btn secondary" id="importCsvBtn" type="button">匯入 CSV</button>
            <button class="btn secondary" id="reloadSiteDataBtn" type="button">重新載入網站資料</button>
            <button class="btn red" id="loadSampleBtn" type="button">載入範例</button>
          </div>
          <input class="hidden" id="jsonFile" type="file" accept="application/json">
          <input class="hidden" id="csvFile" type="file" accept=".csv,text/csv">
          <p class="sample">CSV 欄位：name, group, role, story, event1, event2, event3, event4, imageUrl</p>
          <div class="student-list" id="studentList"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GEM_COMIC_URL = "https://gemini.google.com/gem/1136PtzsZTmBkebcT9VAouv15gDrxmafC?usp=sharing";
    const GEMINI_URL = "https://gemini.google.com/u/0/app";
    const STORE_KEY = "my-cat-comic-students-v23";
    const PROMPT_STORE_KEY = "my-cat-comic-prompt-edits-v1";
    const TEACHER_PASSWORD = "900212";
    const TEACHER_AUTH_KEY = "my-cat-comic-teacher-auth";
    const SITE_DATA_URL = "students.json";

    const sampleStudents = [
      {
        id: "sample-an",
        name: "小安",
        group: "A 組",
        role: "Coach",
        story: "The Test of Courage",
        image: "",
        events: [
          "我在訓練中心教小騎士練習。",
          "我看到有小騎士很害怕。",
          "我告訴他們不要放棄。",
          "大家一起重新練習。"
        ]
      },
      {
        id: "sample-yu",
        name: "小宇",
        group: "A 組",
        role: "Little Knight",
        story: "The Test of Courage",
        image: "",
        events: [
          "我來到訓練中心準備練習。",
          "我看到對手很高大，覺得很害怕。",
          "我聽見教練鼓勵我不要放棄。",
          "我鼓起勇氣，和大家一起重新練習。"
        ]
      }
    ];

    let students = loadStudents();
    let promptEdits = loadPromptEdits();
    let promptHistories = {};
    let applyingPromptHistory = false;
    let selectedId = students[0]?.id || "";
    let stagedImage = "";

    const studentTab = document.getElementById("studentTab");
    const teacherTab = document.getElementById("teacherTab");
    const studentView = document.getElementById("studentView");
    const teacherView = document.getElementById("teacherView");
    const studentSelect = document.getElementById("studentSelect");
    const studentCard = document.getElementById("studentCard");
    const eventsCard = document.getElementById("eventsCard");
    const steps = document.getElementById("steps");
    const toast = document.getElementById("toast");

    const form = document.getElementById("studentForm");
    const editingId = document.getElementById("editingId");
    const nameInput = document.getElementById("nameInput");
    const groupInput = document.getElementById("groupInput");
    const roleInput = document.getElementById("roleInput");
    const storyInput = document.getElementById("storyInput");
    const eventsInput = document.getElementById("eventsInput");
    const imageInput = document.getElementById("imageInput");
    const imagePreview = document.getElementById("imagePreview");
    const studentList = document.getElementById("studentList");

    function loadStudents() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return sampleStudents;
        const parsed = JSON.parse(raw);
        const normalized = normalizeStudents(parsed);
        return normalized.length ? normalized : sampleStudents;
      } catch {
        return sampleStudents;
      }
    }

    function loadPromptEdits() {
      try {
        const raw = localStorage.getItem(PROMPT_STORE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    async function loadSiteStudents({ force = false } = {}) {
      try {
        if (!force && localStorage.getItem(STORE_KEY)) return;
        const response = await fetch(`${SITE_DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        const normalized = normalizeStudents(data);
        if (!normalized.length) return;
        students = normalized;
        selectedId = students[0].id;
        if (force) localStorage.removeItem(STORE_KEY);
        renderAll();
        showToast(force ? "已重新載入網站資料" : "已載入網站資料");
      } catch {
        if (force) showToast("讀不到 students.json");
      }
    }

    function normalizeStudents(data) {
      const list = Array.isArray(data) ? data : data?.students;
      if (!Array.isArray(list)) return [];
      return list.map((student, index) => ({
        id: student.id || `student-${index + 1}`,
        name: student.name || "",
        group: student.group || "",
        role: student.role || "",
        story: student.story || "",
        image: student.image || student.imageUrl || "",
        events: Array.isArray(student.events)
          ? student.events.filter(Boolean).slice(0, 4)
          : [student.event1, student.event2, student.event3, student.event4].filter(Boolean)
      })).filter(student => student.name);
    }

    function saveStudents() {
      localStorage.setItem(STORE_KEY, JSON.stringify(students));
    }

    function savePromptEdits() {
      localStorage.setItem(PROMPT_STORE_KEY, JSON.stringify(promptEdits));
    }

    function uid() {
      return "s-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
    }

    function currentStudent() {
      return students.find(s => s.id === selectedId) || students[0];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function eventsText(student) {
      return (student?.events || []).filter(Boolean).map((event, index) => `${index + 1}. ${event}`).join("\n");
    }

    function savedPromptValue(student, promptKey, fallback) {
      const studentEdits = promptEdits?.[student?.id] || {};
      return Object.prototype.hasOwnProperty.call(studentEdits, promptKey)
        ? studentEdits[promptKey]
        : fallback;
    }

    function savePromptValue(student, promptKey, value) {
      if (!student?.id || !promptKey) return;
      promptEdits[student.id] = {
        ...(promptEdits[student.id] || {}),
        [promptKey]: value
      };
      savePromptEdits();
    }

    function promptRows(text) {
      return Math.min(18, Math.max(8, String(text || "").split("\n").length + 2));
    }

    function promptNoTextComic(student) {

    function promptHistoryKey(student, promptKey) {
      return `${student?.id || "student"}::${promptKey}`;

    function initPromptHistories() {
      steps.querySelectorAll("[data-prompt-editor]").forEach(editor => {
        const key = promptHistoryKey(currentStudent(), editor.dataset.promptEditor);
        promptHistories[key] = {
          values: [editor.value],
          index: 0
        };
        refreshPromptHistoryButtons(editor.dataset.promptEditor);
      });

    function pushPromptHistory(promptKey, value) {
      const key = promptHistoryKey(currentStudent(), promptKey);
      const history = promptHistories[key] || { values: [], index: -1 };
      if (history.values[history.index] === value) {
        refreshPromptHistoryButtons(promptKey);
        return;
      }
      history.values = history.values.slice(0, history.index + 1);
      history.values.push(value);
      if (history.values.length > 40) history.values.shift();
      history.index = history.values.length - 1;
      promptHistories[key] = history;
      refreshPromptHistoryButtons(promptKey);
    }

    function movePromptHistory(promptKey, direction) {
      const key = promptHistoryKey(currentStudent(), promptKey);
      const history = promptHistories[key];
      const editor = steps.querySelector(`[data-prompt-editor="${promptKey}"]`);
      if (!history || !editor) return;
      const nextIndex = history.index + direction;
      if (nextIndex < 0 || nextIndex >= history.values.length) return;
      history.index = nextIndex;
      applyingPromptHistory = true;
      editor.value = history.values[history.index];
      applyingPromptHistory = false;
      savePromptValue(currentStudent(), promptKey, editor.value);
      refreshPromptHistoryButtons(promptKey);
    }

    function refreshPromptHistoryButtons(promptKey) {
      const key = promptHistoryKey(currentStudent(), promptKey);
      const history = promptHistories[key];
      const undoButton = steps.querySelector(`[data-prompt-undo="${promptKey}"]`);
      const redoButton = steps.querySelector(`[data-prompt-redo="${promptKey}"]`);
      if (undoButton) undoButton.disabled = !history || history.index <= 0;
      if (redoButton) redoButton.disabled = !history || history.index >= history.values.length - 1;
    }

    async function copyText(text, label) {

        area.value = text;

    async function imageToPngBlob(image) {
      if (!image) throw new Error("no image");

      if (image.startsWith("data:")) {
        const response = await fetch(image);
        const blob = await response.blob();
        if (blob.type === "image/png") return blob;
        return await convertImageBlobToPng(blob);
      }

      const response = await fetch(image, { mode: "cors" });
      const blob = await response.blob();
      if (blob.type === "image/png") return blob;
      return await convertImageBlobToPng(blob);
    }

    function convertImageBlobToPng(blob) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          canvas.toBlob(pngBlob => {
            if (pngBlob) resolve(pngBlob);
            else reject(new Error("png conversion failed"));
          }, "image/png");
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("image load failed"));
        };
        img.src = url;
      });
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
          }
          if (char === "\r" && next === "\n") i++;
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }
      return rows;
    }

    function importCsv(text) {
      const rows = parseCsv(text).filter(row => row.some(Boolean));
      if (!rows.length) return;
      const headers = rows[0].map(h => h.trim());
      const next = rows.slice(1).map(row => {
        const record = Object.fromEntries(headers.map((header, index) => [header, row[index] || ""]));
        return {
          id: uid(),
          name: record.name || record["姓名"] || "",
          group: record.group || record["組別"] || "",
          role: record.role || record["角色"] || "",
          story: record.story || record["故事"] || record["故事名稱"] || "",
          image: record.imageUrl || record.image || record["角色圖"] || "",
          events: [
            record.event1 || record["事件1"] || "",
            record.event2 || record["事件2"] || "",
            record.event3 || record["事件3"] || "",
            record.event4 || record["事件4"] || ""
          ].filter(Boolean)
        };
      }).filter(student => student.name);
      if (next.length) {
        students = next;
        selectedId = students[0].id;
        saveStudents();
        renderAll();
        showToast(`已匯入 ${next.length} 位學生`);
      }
    }

    function resizeImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            const max = 1000;
            const scale = Math.min(1, max / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", .86));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

        const map = promptMap(student);
        if (map[copyKey]) {
          copyText(map[copyKey][0], `預設${map[copyKey][1]}`);
        }
        return;
      }

      const editedCopyKey = event.target.closest("[data-copy-edited]")?.dataset.copyEdited;
      if (editedCopyKey) {
        const student = currentStudent();
        const map = promptMap(student);
        if (map[editedCopyKey]) {
          copyText(currentPromptText(editedCopyKey, map[editedCopyKey][0]), `修改後${map[editedCopyKey][1]}`);
        }
        return;
      }

      if (event.target.closest("[data-action='copy-image']")) {
        copyCurrentStudentImage();
      }
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      const eventLines = eventsInput.value.split(/\n+/).map(line => line.trim()).filter(Boolean).slice(0, 4);
      const data = {
        id: editingId.value || uid(),
        name: nameInput.value.trim(),
        group: groupInput.value.trim(),
        role: roleInput.value.trim(),
        story: storyInput.value.trim(),
        image: stagedImage,
        events: eventLines
      };
      const index = students.findIndex(student => student.id === data.id);
      if (index >= 0) students[index] = data;
      else students.push(data);
      selectedId = data.id;
      saveStudents();
      renderAll();
      clearForm();
      showToast("學生資料已儲存");
    });

    document.getElementById("clearFormBtn").addEventListener("click", clearForm);

    imageInput.addEventListener("change", async event => {
      const file = event.target.files?.[0];
      if (!file) return;
      stagedImage = await resizeImage(file);
      imagePreview.innerHTML = `<img src="${stagedImage}" alt="角色圖預覽">`;
      showToast("角色圖已載入");
    });

    studentList.addEventListener("click", event => {
      const editId = event.target.closest("[data-edit]")?.dataset.edit;
      const deleteId = event.target.closest("[data-delete]")?.dataset.delete;
      if (editId) editStudent(editId);
      if (deleteId) deleteStudent(deleteId);
    });

    document.getElementById("loadSampleBtn").addEventListener("click", () => {
      students = sampleStudents.map(student => ({ ...student, id: uid() }));
      selectedId = students[0].id;
      saveStudents();
      renderAll();
      showToast("已載入範例資料");
    });

    document.getElementById("reloadSiteDataBtn").addEventListener("click", () => {
      loadSiteStudents({ force: true });
    });

    document.getElementById("exportJsonBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(students, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "my-cat-comic-students.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importJsonBtn").addEventListener("click", () => {
      document.getElementById("jsonFile").click();
    });

    document.getElementById("jsonFile").addEventListener("change", event => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const parsed = JSON.parse(reader.result);
        students = normalizeStudents(parsed).map(student => ({ ...student, id: student.id || uid() }));
        selectedId = students[0]?.id || "";
        saveStudents();
        renderAll();
        showToast("JSON 已匯入");
      };
      reader.readAsText(file);
    });

    document.getElementById("importCsvBtn").addEventListener("click", () => {
      document.getElementById("csvFile").click();
    });

    document.getElementById("csvFile").addEventListener("change", event => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => importCsv(reader.result);
      reader.readAsText(file);
    });

    renderAll();
    loadSiteStudents();
  </script>
</body>
</html>
